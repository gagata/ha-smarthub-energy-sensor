name: Validate with hassfest

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
        - uses: "actions/checkout@v4"
          with:
                  path: "smarthub"
        - name: Validate with hassfest
          uses: "home-assistant/actions/hassfest@master"
